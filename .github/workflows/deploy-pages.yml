# GitHub Pages Deployment Workflow
# Automatically deploys the TUI/CLI Wiki to GitHub Pages

name: Deploy to GitHub Pages

on:
  # Runs on pushes to the main branch
  push:
    branches:
      - main
    paths:
      - 'wiki-tui-cli/**'
  
  # Allows manual workflow dispatch
  workflow_dispatch:

# Sets permissions for GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch all history for proper versioning
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build wiki
        run: |
          echo "Building TUI/CLI Wiki..."
          # Copy wiki-tui-cli contents to root for deployment
          mkdir -p ./_site
          cp -r wiki-tui-cli/* ./_site/
          echo "Build complete!"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
